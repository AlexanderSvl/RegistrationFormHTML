<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Sait</title>
    
    <!--Style = css, да изглежда красиво-->  
    
    <link rel="stylesheet" type="text/css" href="regFormCss.css">
    
</head>
    
<body>
      
   <table align="center">
       <tr>
           <th colspan="2">Регистрационна форма</th>
       </tr>
       
       <tr>
           <td>
               <label for="uname">Потребителскo име</label>
           </td>
           
           <td>
               <input type="text" id="uname" name="uname">
           </td>
       </tr>
       
       <tr>
           <td>
               <label for="email">E-mail</label>
           </td>
           
           <td>
               <input type="email" id="email" name="email">
           </td>
       </tr>
       
       <tr>
           <td>
               <label for="pass">Парола</label>
           </td>
           
           <td>
               <input type="password" id="pass" name="pass">
           </td>
       </tr>
       
       <tr>
           <td>
               <label for="birthdate">Дата на раждане:</label>
           </td>
           
           <td>
               <input type="date" id="birthdate" name="birthdate">
           </td>
       </tr>
       
       <tr>
           <td>
               <label for="age">Възраст:</label>
           </td>
           
           <td>
               <input type="number" id="age" name="age" min="0" max="140">
           </td>
       </tr>
       
       <tr>
           <td>
               <label>Пол:</label>
           </td>
           
           <td>
               <input type="radio" id="female" name="gender">
               <label for="male" id="m">Мъж:</label>
               
               <input type="radio" id="female" name="gender">
               <label for="female" id="fm">Жена:</label>
           </td>
       </tr>
       
       <tr>
           <td>
               <label>Семейно положение:</label>
           </td>
           <td>
               <ul style="list-style: none;">
                   <li>
                       <input type="radio" id="free" name="relationshipStatus">
                       <label for="male">Необвързан</label>
                   </li>
                   <li>
                       <input type="radio" id="taken" name="relationshipStatus">
                       <label for="male">Обвързан</label>
                   </li>
                   <li>
                       <input type="radio" id="complicated" name="relationshipStatus">
                       <label for="male">Сложно е</label>
                   </li>
               </ul>
           </td>
       </tr>
       
       <tr>
           <td>
               <label>Домашни любимци:</label>
           </td>
           <td>
               <ul style="list-style: none;">
                   <li>
                       <input type="checkbox" id="cat" name="cat">
                       <label for="cat">Котка</label>
                   </li>
                   <li>
                       <input type="checkbox" id="dog" name="dog">
                       <label for="dog">Куче</label>
                   </li>
                   <li>
                       <input type="checkbox" id="hamster" name="hamster">
                       <label for="hamster">Хамстер</label>
                   </li>
                   <li>
                       <input type="checkbox" id="other" name="other">
                       <label for="other">Друго</label>
                   </li>
               </ul>
           </td>
       </tr>
       
       <tr>
           <td>
               <label for="region">Област:</label>
           </td>
           <td>
               <select id="region" name="region">
                   <option value="CA">София-Град</option>
                   <option value="CO">Софийска област</option>
                   <option value="B">Варна</option>
                   <option value="Y">Ямбол</option>
                   <option value="other">Друга</option>
               </select>
           </td>
       </tr>
       
       <tr>
           <td>
               <label for="car">Автомобил:</label>
           </td>
           <td>
               <select id="car" name="region">
                   <optgroup label="Немски автомобил">
                       <option value="vw">VW</option>
                       <option value="mercedes">Mercedes</option>
                       <option value="opel">Opel</option>
                       <option value="bmw">BMW</option>
                   </optgroup>
                   <optgroup label="Японски автомобил">
                       <option value="nissan">Nissan</option>
                       <option value="toyota">Toyota</option>
                       <option value="mitsubishi">Mitsubishi</option>
                       <option value="suzuki">Suzuki</option>
                   </optgroup>
                   <optgroup label="Френски автомобил">
                       <option value="peugeot">Peugeot</option>
                       <option value="renault">Renault</option>
                       <option value="citroen">Citroen</option>
                       <option value="bugatti">Bugatti</option>
                   </optgroup>
               </select>
           </td>
       </tr>
       
       <tr>
           <td>
               <label for="color">Любим цвят:</label>
           </td>
           <td>
               <input type="color" id="color" name="color">
           </td>
       </tr>
       
       <tr>
           <td>
               <label for="cv">CV:</label>
           </td>
           <td>
               <input type="file" id="cv" name="cv">
           </td>
       </tr>
       
       <tr>
           <td>
               <label for="mark">Успех в училище:</label>
           </td>
           <td>
               <input type="range" id="mark" min="2" max="6" name="mark">
           </td>
       </tr>
       
       <tr>
           <td>
               <label for="comment">Коментар:</label>
           </td>
           <td>
               <textarea name="comment" id="comment" rows="6" cols="30" style="resize: none;"></textarea>
           </td>
       </tr>
       
       <tr>
           <th colspan="2">
               <input type="submit" name="register" value="Регистрирай се">
               <button>Въведи наново</button>
           </th>
       </tr>
       
   </table>

</body>
</html>
